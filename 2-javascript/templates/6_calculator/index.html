<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taschenrechner</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .calc { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        input { width: 50px; padding: 5px; margin: 5px; }
        button { padding: 5px 10px; cursor: pointer; }
        #result { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="calc">
        <h2>Mini-Rechner</h2>
        <label for="num1"></label><input type="number" id="num1" placeholder="Zahl 1">
        <label for="num2"></label><input type="number" id="num2" placeholder="Zahl 2">
        <br>
        <button id="addBtn">Addieren</button>
        <button id="subBtn">Subtrahieren</button>
        <div id="result">Ergebnis: <span>-</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
