<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Box Model</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .box {
            background-color: gold;
            width: 20px;
            padding: 10px;
            margin: 20px;
            border-color: blue;
            border-style: solid;
            border-width: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="box">
        This is the content of the box.
    </div>
    <div class="box">
        This is the content of the box.
    </div>
    <hr>
</body>
</html>
